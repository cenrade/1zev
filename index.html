<html lang="en">

  <body class="login-page">
    <div class="lock-box">
      <div class="window-bar">
        <div class="dot green-ref"></div>
        <div class="dot yellow-ref"></div>
        <div class="dot blue-ref"></div>
      </div>

      <div class="lock-content">
        <h2>Unsent who?</h2>
        <div class="input-group">
          <input
            type="tel"
            id="passInput"
            maxlength="6"
            placeholder="******"
            oninput="this.value = this.value.replace(/[^0-9]/g, '')"
          />
        </div>

        <button onclick="checkPass()">Continue</button>
        <p
          id="error-msg"
          style="display: none; color: red; margin-top: 15px; font-weight: bold"
        >
          Have you forgotten?
        </p>
        <p class="hint-text">gur cva zhfg or va he abgrf ncc</p>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
